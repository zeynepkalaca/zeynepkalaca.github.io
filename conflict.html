<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conflict Data Explorer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  :root {
    --primary-color: #2c3e50;
    --accent-color: #e74c3c;
    --bg-color: #f4f7f6;
    --card-bg: #ffffff;
    --border-color: #dcdcdc;
    --text-color: #333;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 40px 20px; line-height: 1.6; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { color: var(--primary-color); font-size: 28px; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 20px; }
  a { color: var(--primary-color); text-decoration: none; font-weight: bold; }
  a:hover { text-decoration: underline; }

  /* CSS Form & Control Panel */
  .control-panel { background-color: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border-color); margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
  .control-panel label { font-weight: 600; color: var(--primary-color); font-size: 14px; text-transform: uppercase; }
  .custom-select { padding: 10px 15px; font-size: 15px; border: 1px solid #ccc; border-radius: 5px; background-color: #fff; cursor: pointer; outline: none; flex-grow: 1; max-width: 300px; }

  /* Layout: Map and Chart Side by Side */
  .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
  
  .visual-card { background: var(--card-bg); padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
  
  /* Map Container */
  #map { height: 350px; width: 100%; border-radius: 4px; border: 1px solid #ccc; background: #e5e3df; }

  /* Clean Data Table */
  .data-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .data-table th, .data-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
  .data-table th { background-color: var(--primary-color); color: #ffffff; font-size: 13px; text-transform: uppercase; }
  .data-table tr:hover { background-color: #f1f2f6; }
  .type-badge { background: #ecf0f1; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }
</style>
</head>
<body>

<div class="container">
  <h1>Conflict Data Explorer</h1>
  <p><a href="index.html">← Return to Homepage</a></p>
  
  <div class="control-panel">
    <label for="typeFilter">Select Violence Type:</label>
    <select id="typeFilter" class="custom-select" onchange="processAndDisplayData()">
      <option value="all">View All Recorded Conflicts</option>
      <option value="state-based">State-Based Violence (Type 1)</option>
      <option value="one-sided">One-Sided Violence (Type 3)</option>
    </select>
    <div style="margin-left: auto; font-family: monospace; font-size: 16px;">
      TOTAL FATALITIES: <strong id="total-fatalities" style="color: red; font-size: 20px;">0</strong>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="visual-card">
      <div style="font-size: 12px; font-weight: bold; color: #555; margin-bottom: 10px; text-transform: uppercase;">Spatial Distribution (Radius = Fatalities)</div>
      <div id="map"></div>
    </div>
    <div class="visual-card">
      <div style="font-size: 12px; font-weight: bold; color: #555; margin-bottom: 10px; text-transform: uppercase;">Temporal Distribution</div>
      <canvas id="conflictChart" height="250"></canvas>
    </div>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Year</th>
        <th>Actors Involved</th>
        <th>Location</th>
        <th>Fatalities</th>
        <th>Classification</th>
      </tr>
    </thead>
    <tbody id="api-rows"></tbody>
  </table>
</div>

<script>
  let chartInstance = null;
  let mapInstance = null;
  let mapMarkers = []; // Haritadaki noktaları hafızada tutmak için

  // Kordinat Sözlüğü: Leaflet şehir isimlerini bilemez, enlem ve boylam vermemiz gerekir.
  const coordinates = {
    "Diyarbakir": [37.9144, 40.2306],
    "Sirnak": [37.5189, 42.4537],
    "Hakkari": [37.5744, 43.7408],
    "Mardin": [37.3106, 40.7369],
    "Tunceli": [39.1079, 39.5401],
    "Siirt": [37.9333, 41.9500],
    "Bingol": [38.8847, 40.4939],
    "Gaziantep": [37.0662, 37.3833],
    "Ankara": [39.9334, 32.8597],
    "Istanbul": [41.0082, 28.9784],
    "Border Zone": [37.1000, 42.0000] // Yaklaşık sınır hattı
  };

  const records = [
    { year: 1984, side_a: "Government", side_b: "PKK", adm_1: "Siirt", best: 12, type: 1 },
    { year: 1984, side_a: "Government", side_b: "PKK", adm_1: "Hakkari", best: 18, type: 1 },
    { year: 1987, side_a: "Government", side_b: "Civilians", adm_1: "Mardin", best: 30, type: 3 },
    { year: 1990, side_a: "Government", side_b: "PKK", adm_1: "Sirnak", best: 85, type: 1 },
    { year: 1992, side_a: "Government", side_b: "PKK", adm_1: "Diyarbakir", best: 142, type: 1 },
    { year: 1992, side_a: "Government", side_b: "Civilians", adm_1: "Sirnak", best: 55, type: 3 },
    { year: 1993, side_a: "Government", side_b: "PKK", adm_1: "Sirnak", best: 98, type: 1 },
    { year: 1993, side_a: "Government", side_b: "Civilians", adm_1: "Diyarbakir", best: 40, type: 3 },
    { year: 1994, side_a: "Government", side_b: "PKK", adm_1: "Tunceli", best: 150, type: 1 },
    { year: 1995, side_a: "Government", side_b: "PKK", adm_1: "Hakkari", best: 210, type: 1 },
    { year: 1997, side_a: "Government", side_b: "PKK", adm_1: "Bingol", best: 110, type: 1 },
    { year: 1999, side_a: "Government", side_b: "Civilians", adm_1: "Tunceli", best: 32, type: 3 },
    { year: 2015, side_a: "Government", side_b: "PKK", adm_1: "Diyarbakir", best: 67, type: 1 },
    { year: 2015, side_a: "Government", side_b: "Civilians", adm_1: "Sirnak", best: 45, type: 3 },
    { year: 2015, side_a: "Government", side_b: "IS", adm_1: "Gaziantep", best: 12, type: 1 },
    { year: 2016, side_a: "Government", side_b: "PKK", adm_1: "Mardin", best: 114, type: 1 },
    { year: 2016, side_a: "Government", side_b: "PKK", adm_1: "Sirnak", best: 185, type: 1 },
    { year: 2016, side_a: "Military Faction", side_b: "Government", adm_1: "Ankara", best: 145, type: 1 },
    { year: 2016, side_a: "Military Faction", side_b: "Civilians", adm_1: "Istanbul", best: 95, type: 3 },
    { year: 2018, side_a: "Government", side_b: "PKK", adm_1: "Hakkari", best: 53, type: 1 },
    { year: 2021, side_a: "Government", side_b: "PKK", adm_1: "Diyarbakir", best: 9, type: 1 },
    { year: 2022, side_a: "Government", side_b: "Civilians", adm_1: "Border Zone", best: 14, type: 3 }
  ];

  function initSystem() {
    // 1. Haritayı Başlat (Türkiye koordinatları: Enlem 39.0, Boylam 35.0, Zoom 5)
    mapInstance = L.map('map').setView([39.0, 35.0], 5);
    
    // Açık kaynaklı harita görsellerini (tiles) yükle
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(mapInstance);

    // 2. Verileri Yükle
    processAndDisplayData();
  }

  function processAndDisplayData() {
    const filter = document.getElementById('typeFilter').value;
    const tableBody = document.getElementById('api-rows');
    tableBody.innerHTML = ""; 
    
    let totalDeaths = 0;
    let yearlyData = {};

    // Eski harita noktalarını temizle
    mapMarkers.forEach(marker => mapInstance.removeLayer(marker));
    mapMarkers = [];

    records.forEach(event => {
      let displayType = event.type === 3 ? "one-sided" : "state-based";
      let dotColor = event.type === 3 ? "#e74c3c" : "#3498db"; // Kırmızı = Sivillere Karşı, Mavi = Devlete Karşı

      if (filter === "all" || displayType === filter) {
        const deaths = event.best || 0;
        totalDeaths += deaths;
        
        // Grafik Verisi
        if (yearlyData[event.year]) yearlyData[event.year] += deaths;
        else yearlyData[event.year] = deaths;

        // Harita Noktası (Bubble Map)
        if (coordinates[event.adm_1]) {
          let coords = coordinates[event.adm_1];
          // Noktanın yarıçapı ölüm sayısına göre orantılı büyür (Math.sqrt ile dengeliyoruz)
          let radiusSize = Math.max(5, Math.sqrt(deaths) * 1.5); 
          
          let marker = L.circleMarker(coords, {
            radius: radiusSize,
            fillColor: dotColor,
            color: "#000",
            weight: 1,
            opacity: 1,
            fillOpacity: 0.6
          }).addTo(mapInstance);
          
          // Tıklanınca çıkacak bilgi kutucuğu (Popup)
          marker.bindPopup(`<b>${event.adm_1} (${event.year})</b><br>${event.side_a} vs ${event.side_b}<br>Fatalities: ${deaths}`);
          mapMarkers.push(marker);
        }

        // Tablo Satırı
        tableBody.innerHTML += `<tr>
          <td style="font-family: monospace;">${event.year}</td>
          <td><strong>${event.side_a}</strong> <span style="color:#999; font-size:11px;">VS</span> ${event.side_b}</td>
          <td>${event.adm_1}</td>
          <td style="font-family: monospace; font-weight: bold; color: ${dotColor};">${deaths}</td>
          <td><span class="type-badge">${displayType}</span></td>
        </tr>`;
      }
    });

    document.getElementById('total-fatalities').innerText = totalDeaths.toLocaleString();
    updateChart(yearlyData, filter);
  }

  function updateChart(yearlyData, filterType) {
    const ctx = document.getElementById('conflictChart').getContext('2d');
    const labels = Object.keys(yearlyData).sort();
    const dataPoints = labels.map(y => yearlyData[y]);

    let barColor = filterType === 'state-based' ? '#3498db' : filterType === 'one-sided' ? '#e74c3c' : '#2c3e50';

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{ label: 'Fatalities', data: dataPoints, backgroundColor: barColor, borderRadius: 2 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
  }

  // Sayfa yüklendiğinde sistemi başlat
  window.onload = initSystem;
</script>

</body>
</html>
