<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conflict Data Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1000px; margin: auto; }
        #map { height: 350px; background: #e5e3df; margin-bottom: 20px; }
        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th, .data-table td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Conflict Data Explorer</h1>
    
    <div class="control-panel">
        <label>Violence Type:</label>
        <select id="typeFilter" onchange="processAndDisplayData()">
            <option value="all">All Types</option>
            <option value="state-based">State-Based</option>
            <option value="one-sided">One-Sided</option>
        </select>
        <span>Total Fatalities: <strong id="total-fatalities">0</strong></span>
    </div>

    <div id="map"></div>
    <div class="chart-container" style="height: 200px;">
        <canvas id="conflictChart"></canvas>
    </div>

    <table class="data-table">
        <thead><tr><th>Year</th><th>Actors</th><th>Location</th><th>Fatalities</th><th>Type</th></tr></thead>
        <tbody id="api-rows"></tbody>
    </table>
</div>

<script>
    const coordinates = {
        "Diyarbakir": [37.9144, 40.2306], "Sirnak": [37.5189, 42.4537],
        "Hakkari": [37.5744, 43.7408], "Mardin": [37.3106, 40.7369],
        "Tunceli": [39.1079, 39.5401], "Siirt": [37.9333, 41.9500],
        "Bingol": [38.8847, 40.4939], "Gaziantep": [37.0662, 37.3833],
        "Ankara": [39.9334, 32.8597], "Istanbul": [41.0082, 28.9784],
        "Border Zone": [37.1000, 42.0000]
    };

    const records = [
        { year: 1984, side_a: "Gov", side_b: "PKK", adm_1: "Siirt", best: 12, type: 1 },
        { year: 1992, side_a: "Gov", side_b: "PKK", adm_1: "Diyarbakir", best: 142, type: 1 },
        { year: 1993, side_a: "Gov", side_b: "Civilians", adm_1: "Diyarbakir", best: 40, type: 3 },
        { year: 2016, side_a: "Military", side_b: "Gov", adm_1: "Ankara", best: 145, type: 1 }
    ];

    let map = L.map('map').setView([39.0, 35.0], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let chart, markers = [];

    function processAndDisplayData() {
        const filter = document.getElementById('typeFilter').value;
        const tbody = document.getElementById('api-rows');
        tbody.innerHTML = "";
        markers.forEach(m => map.removeLayer(m));
        
        let total = 0, yearly = {};

        records.forEach(r => {
            let typeName = r.type === 3 ? "one-sided" : "state-based";
            if (filter === "all" || typeName === filter) {
                total += r.best;
                yearly[r.year] = (yearly[r.year] || 0) + r.best;
                
                if(coordinates[r.adm_1]) {
                    markers.push(L.circleMarker(coordinates[r.adm_1], {radius: 8}).addTo(map).bindPopup(`${r.best} fatalities`));
                }
                
                tbody.innerHTML += `<tr><td>${r.year}</td><td>${r.side_a} vs ${r.side_b}</td><td>${r.adm_1}</td><td>${r.best}</td><td>${typeName}</td></tr>`;
            }
        });
        document.getElementById('total-fatalities').innerText = total;
        updateChart(yearly);
    }

    function updateChart(data) {
        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('conflictChart'), {
            type: 'bar',
            data: { labels: Object.keys(data), datasets: [{ label: 'Fatalities', data: Object.values(data) }] }
        });
    }

    processAndDisplayData();
</script>
</body>
</html>
