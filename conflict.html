<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Conflict Data Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #2c3e50; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Conflict Data Explorer</h1>
    <select id="typeFilter" onchange="processAndDisplayData()">
        <option value="all">Tüm Kayıtlar</option>
        <option value="1">State-Based (Tip 1)</option>
        <option value="3">One-Sided (Tip 3)</option>
    </select>
    
    <h3>Toplam Vefat: <span id="total-fatalities">0</span></h3>
    <table class="data-table">
        <thead>
            <tr><th>Yıl</th><th>Taraflar</th><th>Lokasyon</th><th>Vefat</th><th>Tip</th></tr>
        </thead>
        <tbody id="api-rows"></tbody>
    </table>
</div>

<script>
    let records = [];

    async function loadData() {
        try {
            const response = await fetch('data.json');
            records = await response.json();
            processAndDisplayData();
        } catch (e) { console.error("Veri yüklenemedi:", e); }
    }

    function processAndDisplayData() {
        const filter = document.getElementById('typeFilter').value;
        const tbody = document.getElementById('api-rows');
        tbody.innerHTML = "";
        let total = 0;

        records.forEach(row => {
            if (filter === "all" || row.type_of_violence == filter) {
                total += row.best;
                tbody.innerHTML += `<tr>
                    <td>${row.year}</td>
                    <td>${row.side_a} vs ${row.side_b}</td>
                    <td>${row.adm_1}</td>
                    <td>${row.best}</td>
                    <td>${row.type_of_violence}</td>
                </tr>`;
            }
        });
        document.getElementById('total-fatalities').innerText = total;
    }

    window.onload = loadData;
</script>
</body>
</html>
