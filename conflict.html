<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çatışma Haritası</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; width: 100%; margin-bottom: 20px; }
        body { font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>

    <h1>UCDP Çatışma Verileri</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Haritayı başlat (Ankara merkezli)
        var map = L.map('map').setView([39.9334, 32.8597], 6);

        // Harita katmanı (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Örnek Bir Marker (Verilerin geldikçe buraya ekleyeceksin)
        L.marker([37.9144, 40.2306]).addTo(map)
            .bindPopup('Diyarbakır - Çatışma Noktası')
            .openPopup();
    </script>
</body>
</html>
