<script>
    // Expanded UCDP format dataset for Turkey
    const records = [
      // 1990s
      { year: 1992, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Diyarbakir", best: 142, type_of_violence: 1 },
      { year: 1993, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Sirnak", best: 98, type_of_violence: 1 },
      { year: 1994, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Tunceli", best: 150, type_of_violence: 1 },
      { year: 1995, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Hakkari", best: 210, type_of_violence: 1 },
      { year: 1999, side_a: "Government of Turkey", side_b: "Civilians", adm_1: "Tunceli", best: 32, type_of_violence: 3 },

      // 2000s
      { year: 2007, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Hakkari", best: 45, type_of_violence: 1 },
      { year: 2008, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Sirnak", best: 33, type_of_violence: 1 },
      { year: 2011, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Hakkari", best: 82, type_of_violence: 1 },
      { year: 2011, side_a: "Government of Turkey", side_b: "Civilians", adm_1: "Sirnak", best: 34, type_of_violence: 3 },

      // 2010s - Urban Conflicts & Other Actors
      { year: 2015, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Diyarbakir", best: 67, type_of_violence: 1 },
      { year: 2015, side_a: "Government of Turkey", side_b: "Civilians", adm_1: "Sirnak", best: 45, type_of_violence: 3 },
      { year: 2015, side_a: "Government of Turkey", side_b: "IS", adm_1: "Gaziantep", best: 12, type_of_violence: 1 },
      { year: 2016, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Mardin", best: 114, type_of_violence: 1 },
      { year: 2016, side_a: "Government of Turkey", side_b: "Civilians", adm_1: "Diyarbakir", best: 29, type_of_violence: 3 },
      { year: 2016, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Sirnak", best: 185, type_of_violence: 1 },
      
      // 2016 Coup Attempt Context
      { year: 2016, side_a: "Military Faction", side_b: "Government of Turkey", adm_1: "Ankara", best: 145, type_of_violence: 1 },
      { year: 2016, side_a: "Military Faction", side_b: "Civilians", adm_1: "Istanbul", best: 95, type_of_violence: 3 },

      // 2017+ Recent Years
      { year: 2017, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Hakkari", best: 42, type_of_violence: 1 },
      { year: 2018, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Hakkari", best: 53, type_of_violence: 1 },
      { year: 2019, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Sirnak", best: 18, type_of_violence: 1 },
      { year: 2021, side_a: "Government of Turkey", side_b: "PKK", adm_1: "Diyarbakir", best: 9, type_of_violence: 1 },
      { year: 2022, side_a: "Government of Turkey", side_b: "Civilians", adm_1: "Border Zone", best: 14, type_of_violence: 3 }
    ];

    function initDashboard() {
      processAndDisplayData();
    }

    function processAndDisplayData() {
      const typeFilterValue = document.getElementById('typeFilter').value;
      const tableBody = document.getElementById('api-rows');
      tableBody.innerHTML = ""; 
      
      let runningFatalitiesCount = 0;

      records.forEach(event => {
        let displayType = "state-based";
        // UCDP coding: 1 is state-based, 3 is one-sided violence
        if (event.type_of_violence === 3) displayType = "one-sided";

        const matchesType = (typeFilterValue === "all" || displayType === typeFilterValue);

        if (matchesType) {
          const deaths = event.best || 0;
          runningFatalitiesCount += deaths;

          const rowHTML = `<tr>
            <td style="font-family: monospace;">${event.year}</td>
            <td><strong>${event.side_a}</strong> vs. ${event.side_b}</td>
            <td>${event.adm_1}</td>
            <td style="color: red; font-weight: bold; font-family: monospace;">${deaths}</td>
            <td style="font-style: italic; font-size: 11px; text-transform: uppercase;">${displayType}</td>
          </tr>`;
          
          tableBody.innerHTML += rowHTML;
        }
      });

      document.getElementById('total-fatalities').innerText = runningFatalitiesCount;
    }

    window.onload = initDashboard;
  </script>
