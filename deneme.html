<!DOCTYPE html>
<html>
<head>
    <title>marmara region OIZ mapping</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 700px; width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; }
        h2 { color: #1a3a5a; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>marmara region: organized industrial zones</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Start map focused on Northwest Turkey
        var map = L.map('map').setView([40.8, 28.5], 7.5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // This URL must match your GitHub file name exactly
        var geojsonUrl = 'https://raw.githubusercontent.com/zeynepkalaca/zeynepkalaca.github.io/refs/heads/main/marmara.geojson';

        fetch(geojsonUrl)
            .then(response => response.json())
            .then(data => {
                var oizLayer = L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        let props = feature.properties;
                        // Matches the exact headers in your GeoJSON
                        let name = props["Name of the Organized Industrial Zone"] || "N/A";
                        let province = props["Province"] || "Marmara Region";

                        if (province !== "CSVFilter") {
                            layer.bindPopup(
                                "<strong>" + name + "</strong><br>" +
                                "Province: " + province
                            );
                        }
                    },
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 8,
                            fillColor: "#2980b9",
                            color: "#fff",
                            weight: 1.5,
                            fillOpacity: 0.85
                        });
                    }
                }).addTo(map);
                
                // Auto-fit the view to show all industrial zones
                map.fitBounds(oizLayer.getBounds());
            })
            .catch(error => console.error('Error loading GeoJSON:', error));
    </script>
</body>
</html>
